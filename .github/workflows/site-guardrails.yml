name: Site Guardrails

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Run dependency security gates
        run: npm run security

      - name: Build Astro site
        run: npm run build

      - name: Verify system Chrome
        run: google-chrome --version

      - name: Verify header geometry
        run: npm run verify:headers
        env:
          PLAYWRIGHT_CHANNEL: chrome

      - name: Verify route parity
        run: npm run verify:routes
        env:
          PLAYWRIGHT_CHANNEL: chrome

      - name: Verify design system guardrails
        run: npm run verify:design
        env:
          PLAYWRIGHT_CHANNEL: chrome
